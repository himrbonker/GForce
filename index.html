<body style="margin:0; overflow:hidden;">

<style>
/* ===== CROP SETTINGS (EDIT THESE) ===== */
:root{
  --left: -20px;   /* move page left/right */
  --top: 0px;    /* move page up/down */
  --zoom: 1.1;      /* zoom level */
}
/* ====================================== */

.embed-container{
  width:100%;
  height:100vh;
  overflow:hidden;
  position:relative;
}

.embed-frame{
  position:absolute;
  top:var(--top);
  left:var(--left);
  width:120vw;
  height:120vh;
  border:none;
  transform:scale(var(--zoom));
  transform-origin:top left;
}
</style>

<div class="embed-container">
  <iframe
    class="embed-frame"
    src="https://learn.artweb.website.cdn.cloudflare.net/&?q=Geforce%20NOW">
  </iframe>
</div>

</body>
